<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - SONICVEST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #F8FAF8;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0B3D2E 0%, #0B6B4E 50%, #1F8A70 100%);
            padding: 32px 20px 36px;
            margin: -20px -20px 28px -20px;
            border-bottom-left-radius: 28px;
            border-bottom-right-radius: 28px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(167,243,208,0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: -80px;
            right: -60px;
        }

        .header::after {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(167,243,208,0.1) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -60px;
            left: -40px;
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .header-title {
            color: white;
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            letter-spacing: -0.02em;
        }

        /* Profile Card */
        .profile-card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 8px 40px rgba(7,30,22,0.08);
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid rgba(7,30,22,0.05);
            position: relative;
            overflow: hidden;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #0B3D2E, #1F8A70);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0B3D2E 0%, #0B6B4E 50%, #1F8A70 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            color: white;
            font-size: 44px;
            box-shadow: 0 8px 24px rgba(11,61,46,0.25);
        }

        .profile-name {
            font-size: 22px;
            font-weight: 900;
            color: #142114;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .profile-code {
            font-size: 14px;
            color: #6B7A6B;
            font-family: 'Monaco', 'Menlo', monospace;
            font-weight: 600;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            border-radius: 18px;
            padding: 20px 14px;
            box-shadow: 0 4px 16px rgba(7,30,22,0.06);
            text-align: center;
            border: 1px solid rgba(7,30,22,0.04);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(7,30,22,0.1);
        }

        .stat-value {
            font-size: 18px;
            font-weight: 900;
            color: #0B3D2E;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .stat-label {
            font-size: 11px;
            color: #6B7A6B;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
        }

        /* Menu List */
        .menu-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .menu-item {
            background: white;
            border-radius: 18px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            color: #142114;
            box-shadow: 0 4px 16px rgba(7,30,22,0.06);
            border: 1px solid rgba(7,30,22,0.04);
            transition: all 0.3s;
        }

        .menu-item:hover {
            transform: translateX(6px);
            box-shadow: 0 8px 24px rgba(7,30,22,0.1);
        }

        .menu-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #A7F3D0 0%, #6EE7B7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0B3D2E;
            font-size: 20px;
            flex-shrink: 0;
        }

        .menu-text {
            flex: 1;
            font-size: 15px;
            font-weight: 700;
        }

        .menu-arrow {
            color: #9CA69C;
            font-size: 18px;
        }

        /* Logout Button */
        .logout-btn {
            width: 100%;
            padding: 18px;
            background: white;
            border: 2px solid #FEE2E2;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 800;
            color: #DC2626;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(220,38,38,0.06);
        }

        .logout-btn:hover {
            background: #FEF2F2;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(220,38,38,0.12);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 12px 16px 24px;
            box-shadow: 0 -8px 32px rgba(7,30,22,0.12);
            z-index: 1000;
            border-top: 1px solid rgba(7,30,22,0.08);
        }

        .nav-items {
            display: flex;
            justify-content: space-around;
            max-width: 500px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: #9CA69C;
            padding: 8px 16px;
            border-radius: 14px;
            transition: all 0.2s;
        }

        .nav-item.active {
            color: #0B3D2E;
            background: linear-gradient(135deg, #F0FDF4 0%, #DCFCE7 100%);
        }

        .nav-icon {
            font-size: 22px;
        }

        .nav-label {
            font-size: 12px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <h1 class="header-title">Profile</h1>
            </div>
        </div>

        <!-- Profile Card -->
        <div class="profile-card">
            <div class="profile-avatar">
                <i class="fas fa-user"></i>
            </div>
            <div class="profile-name">{{ user.name or 'User' }}</div>
            <div class="profile-code">{{ user.referral_code }}</div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">₦{{ (user.balance or 0) | format_number }}</div>
                <div class="stat-label">Total Balance</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">₦{{ (user.recharge_balance or 0) | format_number }}</div>
                <div class="stat-label">Recharge</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">₦{{ (user.main_balance or 0) | format_number }}</div>
                <div class="stat-label">Main</div>
            </div>
        </div>

        <!-- Menu Section -->
        <div class="menu-section">
            <a href="{{ url_for('deposit') }}" class="menu-item">
                <div class="menu-icon">
                    <i class="fas fa-plus-circle"></i>
                </div>
                <span class="menu-text">Deposit</span>
                <i class="fas fa-chevron-right menu-arrow"></i>
            </a>
            <a href="{{ url_for('withdrawal') }}" class="menu-item">
                <div class="menu-icon">
                    <i class="fas fa-money-bill-wave"></i>
                </div>
                <span class="menu-text">Withdrawals</span>
                <i class="fas fa-chevron-right menu-arrow"></i>
            </a>
            <a href="{{ url_for('transactions') }}" class="menu-item">
                <div class="menu-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <span class="menu-text">Transactions</span>
                <i class="fas fa-chevron-right menu-arrow"></i>
            </a>
        </div>

        <!-- Logout Button -->
        <a href="{{ url_for('logout') }}" class="logout-btn" onclick="return confirm('Are you sure you want to logout?')">
            <i class="fas fa-sign-out-alt"></i>
            Logout
        </a>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-items">
            <a href="{{ url_for('dashboard') }}" class="nav-item">
                <i class="fas fa-home nav-icon"></i>
                <span class="nav-label">Home</span>
            </a>
            <a href="{{ url_for('packages') }}" class="nav-item">
                <i class="fas fa-box nav-icon"></i>
                <span class="nav-label">Plans</span>
            </a>
            <a href="{{ url_for('referral') }}" class="nav-item">
                <i class="fas fa-users nav-icon"></i>
                <span class="nav-label">Team</span>
            </a>
            <a href="{{ url_for('profile') }}" class="nav-item active">
                <i class="fas fa-user nav-icon"></i>
                <span class="nav-label">Profile</span>
            </a>
        </div>
    </div>    
    <!-- Vercel Web Analytics -->
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>

</body>
</html>
